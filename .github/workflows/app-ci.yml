name: App CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/app-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/app-ci.yml"

jobs:
  zodia:
    name: Zodia
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm --filter zodia typecheck

      - name: Test
        run: corepack pnpm --filter zodia test

      - name: Build SDK
        run: corepack pnpm --filter @zodiacs/sdk build

      - name: Build
        run: corepack pnpm --filter zodia build
