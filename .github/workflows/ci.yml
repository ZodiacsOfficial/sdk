name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Format
        run: corepack pnpm format:check

      - name: Registry checksum
        run: corepack pnpm registry:checksum

      - name: Neutrality guard
        run: corepack pnpm neutrality:guard

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

      - name: Pack dry run
        run: corepack pnpm pack:dry-run

      - name: Package contents
        run: corepack pnpm package:contents

      - name: Export smoke
        run: corepack pnpm exports:smoke
